<!-- Frozen account notice; shown when FreezeUserMiddleware redirects a user. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Frozen | Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .frozen-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .frozen-icon {
            width: 100px;
            height: 100px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .frozen-icon i {
            font-size: 50px;
            color: white;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 15px;
        }
        .message {
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-logout {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
            color: white;
        }
        .support-text {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="frozen-card">
        <div class="frozen-icon">
            <i class="fas fa-snowflake"></i>
        </div>
        <h1>Account Frozen</h1>
        <div class="message">
            <i class="fas fa-exclamation-triangle text-warning me-2"></i>
            Your account has been frozen by the administrator.<br><br>
            Please contact your system administrator for assistance.
        </div>
        <form action="{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                <i class="fas fa-sign-out-alt me-2"></i> Logout
            </button>
        </form>
        <div class="support-text">
            <i class="fas fa-envelope me-1"></i> support@tracker.com
        </div>
    </div>
    <script>
    // Disable back/forward navigation (traps user on this page)
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
        history.go(1);
    };

    // Prevent ESC key from doing anything (optional)
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            e.preventDefault();
            e.stopPropagation();
        }
    });

    // Poll to see if the user was unfrozen by an administrator
    setInterval(() => {
        fetch('/user-mgmt/check-frozen/')
            .then(res => res.json())
            .then(data => {
                if (data.is_frozen === false) {
                    window.location.href = '/'; // redirect back to dashboard
                }
            })
            .catch(err => console.error(err));
    }, 5000); // Check every 5 seconds
</script>
</body>
</html>
